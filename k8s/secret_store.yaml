---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: prodclstore
spec:
  provider:
    aws:
      service: SecretsManager      # ← changed from ParameterStore
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-credentials-sec-store
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: prodclstore
    kind: ClusterSecretStore
  target:
    name: db-credentials-sec-store
    creationPolicy: Owner
  data:
    - secretKey: DB_USER
      remoteRef:
        key: /prod/app-1/          # ← corrected path
        property: username         # ← matches your secret key
    - secretKey: DB_PASSWORD
      remoteRef:
        key: /prod/app-1/          # ← corrected path
        property: password         # ← matches your secret key